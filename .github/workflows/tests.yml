name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, pgsql, bcmath
          coverage: none
      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Check formatting (Pint)
        run: vendor/bin/pint --test
      - name: Static analysis (PHPStan)
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

  test:
    name: test (PHP ${{ matrix.php }}, PG ${{ matrix.postgres }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        postgres: ['18']
        include:
          # Guards the PostgreSQL floor claimed in docs/guide/requirements.md.
          # Without this the whole matrix runs on the newest release and the
          # supported range is only ever tested at its ceiling.
          - php: '8.4'
            postgres: '16'

    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: meteric_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_pgsql, pgsql, bcmath
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: meteric_test
          DB_USERNAME: postgres
          DB_PASSWORD: secret
        run: vendor/bin/pest

  # Single required check for branch protection: green only if quality + every
  # matrix test job passed. Lets auto-merge gate on one stable context.
  ci-success:
    if: always()
    needs: [quality, test]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [ "${{ needs.quality.result }}" != "success" ] || [ "${{ needs.test.result }}" != "success" ]; then
            echo "A required job failed."
            exit 1
          fi
          echo "All green."
